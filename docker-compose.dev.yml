services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16-alpine
    container_name: sqlcraft-postgres
    environment:
      POSTGRES_USER: sqlcraft
      POSTGRES_PASSWORD: sqlcraft
      POSTGRES_DB: sqlcraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlcraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox-postgres:
    image: postgres:16-alpine
    container_name: sqlcraft-sandbox-postgres
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: sandbox_template
    ports:
      - "5433:5432"
    volumes:
      - sandbox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sqlcraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    container_name: sqlcraft-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 3

  # ---- Application Services ----
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: sqlcraft-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sqlcraft:sqlcraft@postgres:5432/sqlcraft
      REDIS_URL: redis://redis:6379
      SANDBOX_DB_HOST: sandbox-postgres
      SANDBOX_DB_PORT: 5432
      SANDBOX_DB_USER: sandbox
      SANDBOX_DB_PASSWORD: sandbox
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: sqlcraft-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile.dev
    container_name: sqlcraft-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sqlcraft:sqlcraft@postgres:5432/sqlcraft
      REDIS_URL: redis://redis:6379
      SANDBOX_DB_HOST: sandbox-postgres
      SANDBOX_DB_PORT: 5432
      SANDBOX_DB_USER: sandbox
      SANDBOX_DB_PASSWORD: sandbox
    volumes:
      - ./services/worker:/app/services/worker
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  sandbox_postgres_data:
  redis_data:
  minio_data:
