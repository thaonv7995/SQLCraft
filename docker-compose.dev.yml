services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16-alpine
    container_name: sqlcraft-postgres
    environment:
      POSTGRES_USER: sqlcraft
      POSTGRES_PASSWORD: sqlcraft
      POSTGRES_DB: sqlcraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlcraft"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlcraft

  redis:
    image: redis:7-alpine
    container_name: sqlcraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - sqlcraft

  minio:
    image: minio/minio
    container_name: sqlcraft-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - sqlcraft

  # ---- Application Services ----
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: sqlcraft-api
    env_file: .env
    environment:
      NODE_OPTIONS: --max-old-space-size=8192
      DATABASE_URL: postgresql://sqlcraft:sqlcraft@postgres:5432/sqlcraft
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: sqlcraft:docker-dev
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: http://localhost:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET:-sqlcraft}
      SANDBOX_DB_HOST: sandbox-unconfigured
      SANDBOX_DB_PORT: 5432
      SANDBOX_DB_USER: sandbox
      SANDBOX_DB_PASSWORD: sandbox
      SANDBOX_MSSQL_SA_PASSWORD: SqlForge1!Sb
    command: sh -c "cd /app/apps/api && pnpm db:migrate && pnpm dev"
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - sqlcraft

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: sqlcraft-web
    environment:
      NEXT_PUBLIC_API_URL: /v1
      NEXT_INTERNAL_API_ORIGIN: http://api:4000
    ports:
      - "13029:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sqlcraft

  # Sandbox-heavy queues (provision / reset / cleanup + expiry). Needs Docker socket.
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile.dev
    container_name: sqlcraft-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sqlcraft:sqlcraft@postgres:5432/sqlcraft
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: sqlcraft:docker-dev
      WORKER_ROLE: sandbox
      # Same object storage as API (golden snapshot upload uses mc inside this container).
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: ${STORAGE_BUCKET:-sqlcraft}
      STORAGE_DOCKER_CONTAINER: sqlcraft-minio
      SANDBOX_DB_HOST: sandbox-unconfigured
      SANDBOX_DB_PORT: 5432
      SANDBOX_DB_USER: sandbox
      SANDBOX_DB_PASSWORD: sandbox
      SANDBOX_MSSQL_SA_PASSWORD: SqlForge1!Sb
      SANDBOX_DOCKER_NETWORK: sqlcraft-dev
    volumes:
      - ./services/worker:/app/services/worker
      - ./packages:/app/packages
      - /app/node_modules
      - /app/services/worker/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: sh -c "cd /app/services/worker && pnpm dev"
    restart: unless-stopped
    networks:
      - sqlcraft

  # Interactive query jobs only — separate Node process so long restores do not block queries.
  worker-query:
    build:
      context: .
      dockerfile: services/worker/Dockerfile.dev
    container_name: sqlcraft-worker-query
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sqlcraft:sqlcraft@postgres:5432/sqlcraft
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: sqlcraft:docker-dev
      WORKER_ROLE: query
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: ${STORAGE_BUCKET:-sqlcraft}
      STORAGE_DOCKER_CONTAINER: sqlcraft-minio
      SANDBOX_DB_HOST: sandbox-unconfigured
      SANDBOX_DB_PORT: 5432
      SANDBOX_DB_USER: sandbox
      SANDBOX_DB_PASSWORD: sandbox
      SANDBOX_MSSQL_SA_PASSWORD: SqlForge1!Sb
    volumes:
      - ./services/worker:/app/services/worker
      - ./packages:/app/packages
      - /app/node_modules
      - /app/services/worker/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: sh -c "cd /app/services/worker && pnpm dev"
    restart: unless-stopped
    networks:
      - sqlcraft

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sqlcraft:
    name: sqlcraft-dev
