name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sqlforge
          POSTGRES_PASSWORD: sqlforge
          POSTGRES_DB: sqlforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://sqlforge:sqlforge@localhost:5432/sqlforge_test
          REDIS_URL: redis://localhost:6379
          # config.ts requires >=32 chars and full storage/sandbox vars when router tests load the app
          JWT_SECRET: test-jwt-secret-minimum-32-characters-ci
          STORAGE_ENDPOINT: http://127.0.0.1:9000
          STORAGE_ACCESS_KEY: test-access-key
          STORAGE_SECRET_KEY: test-secret-key
          SANDBOX_DB_HOST: localhost
          SANDBOX_DB_USER: sandbox
          SANDBOX_DB_PASSWORD: sandbox
