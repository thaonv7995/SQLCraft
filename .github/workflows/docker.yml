name: Docker

# Verify production Dockerfiles build on every change (no registry push).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: docker compose build (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Compose references env_file: .env.production for api/worker; example is enough for image builds.
      - run: cp .env.production.example .env.production
      - uses: docker/setup-buildx-action@v3
      - run: docker compose -f docker-compose.prod.yml build
